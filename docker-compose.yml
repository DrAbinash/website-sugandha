services:
  hope-neurotrauma-website:
    container_name: hope-neurotrauma-website
    build: .
    image: hope-neurotrauma:latest
    restart: unless-stopped
    ports:
      - "3008:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/hospital.db
      - NEXT_PUBLIC_SITE_URL=https://hopeneurotrauma.in
    volumes:
      - hope-neuro-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  hope-neuro-data:
    name: hope-neuro-data
