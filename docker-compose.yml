services:
  care-diagnostics-website:
    container_name: care-diagnostics-website
    build: .
    image: care-diagnostics:latest
    restart: unless-stopped
    ports:
      - "3009:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/care_diagnostics.db
      - NEXT_PUBLIC_SITE_URL=https://carediagnostics.in
    volumes:
      - care-diagnostics-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  care-diagnostics-data:
    name: care-diagnostics-data
